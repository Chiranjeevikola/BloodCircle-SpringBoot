# ===== BloodCircle — Spring Boot Configuration =====

server.port=8080

# ===== Database (H2 for development) =====
spring.datasource.url=jdbc:h2:file:./data/bloodcircle
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===== JWT =====
jwt.secret=bloodcircle-dev-secret-key-change-in-production-must-be-at-least-256-bits-long
jwt.expiration=86400000
jwt.refresh-expiration=2592000000

# ===== Admin Seed =====
admin.email=chiranjeevi.kola@zohomail.in
admin.password=g0abdkbxa6

# ===== Mail (SMTP — Gmail) =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
