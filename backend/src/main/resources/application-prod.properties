# ===== BloodCircle — Production (PostgreSQL) =====

# Render sets PORT env var
server.port=${PORT:8080}

# CORS — set to your Render URL
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://bloodcircle.onrender.com}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bloodcircle}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console in production
spring.h2.console.enabled=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=2592000000

# Admin Seed
admin.email=${ADMIN_EMAIL:chiranjeevi.kola@zohomail.in}
admin.password=${ADMIN_PASSWORD}

# ===== Mail (SMTP — Gmail) =====
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
