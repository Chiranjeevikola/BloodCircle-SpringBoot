databases:
  - name: bloodcircle-db
    databaseName: bloodcircle
    user: bloodcircle
    plan: free

services:
  - type: web
    name: bloodcircle
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: bloodcircle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: chiranjeevi.kola@zohomail.in
      - key: ADMIN_PASSWORD
        value: g0abdkbxa6
      - key: MAIL_USERNAME
        value: chirukola123@gmail.com
      - key: MAIL_PASSWORD
        sync: false  # Set manually in Render dashboard (sensitive)
