databases:
  - name: bloodcircle-db
    databaseName: bloodcircle
    user: bloodcircle
    plan: free

services:
  - type: web
    name: bloodcircle
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn run:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bloodcircle-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NODE_VERSION
        value: "18"
